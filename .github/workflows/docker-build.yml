name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Training Engine
        uses: docker/build-push-action@v5
        with:
          context: ./training
          file: ./training/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/titanic-engine:latest

      - name: Build and push Serving Waiter
        uses: docker/build-push-action@v5
        with:
          context: ./serving
          file: ./serving/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/titanic-waiter:latest
